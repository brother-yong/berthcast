{% extends "base.html" %}
{% block title %}Sign In — BerthAI{% endblock %}

{% block content %}
<div class="page-narrow">
  <div class="page-header" style="text-align:center;">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="BerthAI" style="width:160px; height:auto; margin: 0 auto 4px; display:block;">
    <p style="margin-top:8px;">Sign in to your account</p>
  </div>

  <div class="card">
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required autofocus
               placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
        Sign in
      </button>
    </form>
  </div>

  <p style="text-align:center; color:var(--muted); font-size:14px; margin-top:20px;">
    Don't have an account? Contact your
    <a href="{{ url_for('contact') }}"
       style="color:var(--brass-3); font-weight:600; text-decoration:none; border-bottom:1.5px solid var(--brass); padding-bottom:1px;">BerthAI administrator</a>.
  </p>
  <p style="text-align:center; margin-top:12px;">
    <a href="{{ url_for('landing') }}" style="color:var(--muted); font-size:13px; text-decoration:none;">← Back to homepage</a>
  </p>
</div>
{% endblock %}
