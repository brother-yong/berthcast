services:
  - type: web
    name: berthai
    runtime: python
    buildCommand: pip install -r requirements.txt
    # --threads must stay ABOVE app.py's MAX_CONCURRENT_STREAMS (the cap on
    # simultaneous SSE streams) so plain page loads always have free threads.
    # 4 threads is how a handful of held streams froze the whole site on
    # 11 June 2026. Threads are cheap here: they wait on the Claude API.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --worker-class gthread --threads 12
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Persistent DB path on the mounted disk. Survives deploys.
      - key: DB_PATH
        value: /var/data/berthai.db
      # Where uploaded files land. Also on the disk so resumable uploads survive a worker restart.
      - key: UPLOAD_FOLDER
        value: /var/data/uploads
    disk:
      name: berthai-data
      mountPath: /var/data
      sizeGB: 1
